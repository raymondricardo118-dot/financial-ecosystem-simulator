<!DOCTYPE html>
<html>
<head>
<title>Institutional Trading Terminal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070a;
  color:#e5e7eb;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
  font-size:12px;
  color:#9ca3af;
}

.live{
  color:#22c55e;
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns: 240px 1fr;
  height:calc(100vh - 40px);
}

/* SIDEBAR */
.sidebar{
  background:#0b1220;
  padding:15px;
  border-right:1px solid #1f2937;
}

.sidebar h3{
  color:#38bdf8;
  font-size:12px;
}

.sidebar a{
  display:block;
  margin-top:10px;
  padding:10px;
  background:#111827;
  color:#9ca3af;
  text-decoration:none;
  cursor:pointer;
  border-radius:5px;
}

.sidebar a:hover{
  background:#1f2937;
  color:white;
}

/* MAIN */
.main{
  padding:15px;
}

/* PANELS */
.panel{
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:6px;
  padding:12px;
  margin-bottom:15px;
}

.title{
  color:#38bdf8;
  font-size:12px;
  margin-bottom:8px;
}

/* MODULES */
.module{
  display:none;
}

.active{
  display:block;
}

/* FEED */
.feed{
  font-size:12px;
  color:#22c55e;
  height:160px;
  overflow:hidden;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>HEDGE FUND TRADING TERMINAL v7.0</div>
  <div class="live">● LIVE SIMULATION ENGINE</div>
  <div id="clock"></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>MODULES</h3>

  <a onclick="showModule('trade')">Trade Desk</a>
  <a onclick="showModule('nav')">NAV Engine</a>
  <a onclick="showModule('ops')">Operations</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TRADE MODULE -->
<div id="trade" class="module active">

  <div class="panel">
    <div class="title">MARKET DATA</div>
    <div id="market"></div>
  </div>

  <div class="panel">
    <div class="title">TRADE FEED</div>
    <div class="feed" id="tradeFeed"></div>
  </div>

</div>

<!-- NAV MODULE -->
<div id="nav" class="module">

  <div class="panel">
    <div class="title">NAV ENGINE</div>
    <div id="navValue">NAV: Loading...</div>
  </div>

</div>

<!-- OPS MODULE -->
<div id="ops" class="module">

  <div class="panel">
    <div class="title">OPERATIONS SYSTEM</div>
    <div id="opsStatus">IDLE</div>
  </div>

</div>

</div>
</div>

<script>

/* ---------------- MODULE SWITCH ---------------- */
function showModule(id){
  document.querySelectorAll('.module').forEach(m=>{
    m.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* ---------------- CLOCK ---------------- */
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

/* ---------------- MARKET ENGINE (REALISTIC RANDOM WALK) ---------------- */

let market = {
  AAPL: 185.25,
  MSFT: 412.10,
  TSLA: 720.50,
  NVDA: 875.00
};

function updateMarket(){
  let html = "";

  for(let s in market){
    let drift = (Math.random()-0.5)*1.5;
    market[s] += drift;

    html += `${s}: ${market[s].toFixed(2)}<br>`;
  }

  document.getElementById("market").innerHTML = html;
}

/* ---------------- TRADE ENGINE ---------------- */

let trades = [];

function updateTrades(){
  let keys = Object.keys(market);
  let sym = keys[Math.floor(Math.random()*keys.length)];

  trades.unshift(`${sym} EXEC @ ${market[sym].toFixed(2)}`);
  if(trades.length > 10) trades.pop();

  document.getElementById("tradeFeed").innerHTML =
    trades.join("<br>");
}

/* ---------------- NAV ENGINE ---------------- */

let nav = 7200000;

function updateNAV(){
  nav += (Math.random()-0.5)*30000;

  document.getElementById("navValue").innerText =
    "NAV: $" + nav.toFixed(2);
}

/* ---------------- OPS ENGINE ---------------- */

const opsStates = [
  "RUNNING RISK CHECKS",
  "PROCESSING BATCH JOBS",
  "RECONCILING POSITIONS",
  "UPDATING LEDGER",
  "IDLE"
];

function updateOps(){
  document.getElementById("opsStatus").innerText =
    opsStates[Math.floor(Math.random()*opsStates.length)];
}

/* ---------------- MAIN LOOP ---------------- */
setInterval(()=>{
  updateMarket();
  updateTrades();
  updateNAV();
  updateOps();
},1000);

</script>

</body>
</html>
