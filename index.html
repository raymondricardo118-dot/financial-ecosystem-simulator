<!DOCTYPE html>
<html>
<head>
<title>Institutional Trading Terminal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070a;
  color:#e5e7eb;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:10px 15px;
  background:#0f172a;
  border-bottom:1px solid #1f2937;
  font-size:12px;
  color:#9ca3af;
}

.live{
  color:#22c55e;
  font-weight:bold;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns: 240px 1fr 320px;
  height:calc(100vh - 40px);
}

/* SIDEBAR */
.sidebar{
  background:#0b1220;
  padding:15px;
  border-right:1px solid #1f2937;
}

.sidebar h3{
  color:#38bdf8;
  font-size:12px;
}

.sidebar a{
  display:block;
  margin-top:10px;
  padding:10px;
  background:#111827;
  color:#9ca3af;
  text-decoration:none;
  cursor:pointer;
  border-radius:5px;
}

.sidebar a:hover{
  background:#1f2937;
  color:white;
}

/* MAIN */
.main{
  padding:15px;
}

/* RIGHT PANEL */
.right{
  border-left:1px solid #1f2937;
  padding:15px;
}

/* PANELS */
.panel{
  background:#0f172a;
  border:1px solid #1f2937;
  border-radius:6px;
  padding:12px;
  margin-bottom:15px;
}

.title{
  color:#38bdf8;
  font-size:12px;
  margin-bottom:8px;
}

/* FEEDS */
.feed{
  height:160px;
  overflow:hidden;
  font-size:11px;
  color:#22c55e;
}

/* TABLE */
table{
  width:100%;
  font-size:12px;
  border-collapse:collapse;
}

td{
  padding:6px;
  border-bottom:1px solid #1f2937;
  color:#9ca3af;
}

.alert{
  color:#facc15;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>HEDGE FUND TRADING TERMINAL v6.0</div>
  <div class="live">● LIVE SIMULATED MARKET</div>
  <div id="clock"></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>MODULES</h3>
  <a onclick="show('trade')">Trade Desk</a>
  <a onclick="show('nav')">NAV Engine</a>
  <a onclick="show('ops')">Operations</a>
</div>

<!-- MAIN -->
<div class="main">

  <div class="panel">
    <div class="title">MARKET PRICES</div>
    <div id="market"></div>
  </div>

  <div class="panel">
    <div class="title">TRADE FEED</div>
    <div class="feed" id="tradeFeed"></div>
  </div>

</div>

<!-- RIGHT -->
<div class="right">

  <div class="panel">
    <div class="title">PORTFOLIO NAV</div>
    <div id="nav">NAV: Loading...</div>
  </div>

  <div class="panel">
    <div class="title">OPS STATUS</div>
    <div id="ops">IDLE</div>
  </div>

</div>

</div>

<script>

/* ---------------- CLOCK ---------------- */
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString();
},1000);

/* ---------------- MARKET ENGINE (REALISTIC RANDOM WALK) ---------------- */

let market = {
  AAPL: 185.25,
  MSFT: 412.10,
  TSLA: 720.50,
  NVDA: 875.00
};

function updateMarket(){
  let html = "";

  for(let s in market){
    let drift = (Math.random()-0.5)*1.5;
    market[s] = Math.max(1, market[s] + drift);

    let arrow = drift > 0 ? "▲" : "▼";

    html += `${s}: ${market[s].toFixed(2)} ${arrow}<br>`;
  }

  document.getElementById("market").innerHTML = html;
}

/* ---------------- TRADE ENGINE (LINKED TO MARKET) ---------------- */

let trades = [];

function updateTrades(){
  let keys = Object.keys(market);
  let sym = keys[Math.floor(Math.random()*keys.length)];

  let trade = `${sym} EXECUTED @ ${market[sym].toFixed(2)}`;

  trades.unshift(trade);
  if(trades.length > 10) trades.pop();

  document.getElementById("tradeFeed").innerHTML =
    trades.join("<br>");
}

/* ---------------- NAV ENGINE ---------------- */

let nav = 7200000;

function updateNAV(){
  let drift = (Math.random()-0.5)*40000;
  nav += drift;

  document.getElementById("nav").innerText =
    "NAV: $" + nav.toFixed(2);
}

/* ---------------- OPS ENGINE ---------------- */

const opsStates = [
  "RUNNING RISK CHECKS",
  "PROCESSING BATCH",
  "RECONCILING POSITIONS",
  "UPDATING LEDGER",
  "IDLE"
];

function updateOps(){
  document.getElementById("ops").innerText =
    opsStates[Math.floor(Math.random()*opsStates.length)];
}

/* ---------------- MASTER LOOP ---------------- */

setInterval(()=>{
  updateMarket();
  updateTrades();
  updateNAV();
  updateOps();
}, 1000);

</script>

</body>
</html>
